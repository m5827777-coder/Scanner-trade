name: 🤖 Trading Bot

on:
  schedule:
    - cron: '*/5 * * * *'      # каждые 5 минут
    - cron: '0 */6 * * *'      # каждые 6 часов — email отчёт
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: false
        default: 'scan'
        type: choice
        options: [scan, report, close_all, reset_state]

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: cd bot && npm install

      - name: Run bot
        env:
          TG_TOKEN:       ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:     ${{ secrets.TG_CHAT_ID }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ACTION:         ${{ github.event.inputs.action || 'scan' }}
          IS_REPORT_RUN:  ${{ github.event.schedule == '0 */6 * * *' && 'true' || 'false' }}
        run: cd bot && node index.js

      - name: Save state
        run: |
          git config user.name  "TradingBot"
          git config user.email "bot@noreply.github.com"
          git add data/ dashboard/
          git diff --staged --quiet || git commit -m "scan #$(python3 -c 'import json;d=json.load(open(\"data/state.json\"));print(d.get(\"scanCount\",0))')" && git push
